<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager Cloud</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#0f172a; color:white; }
.container { max-width:1100px; margin:auto; padding:15px; }

h2 { text-align:center; }

/* FORM */
.form-row {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
}

input, select {
    padding:10px;
    border-radius:8px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    flex:1;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* SUMMARY */
.summary {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
    margin-top:15px;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

/* GRID */
.main-grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

/* TABLE */
table { width:100%; border-collapse:collapse; }

th, td {
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:center;
}

td button { background:#ef4444; }

/* CHART */
.chart-box {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

@media(max-width:768px){
    .summary { grid-template-columns:1fr; }
    .main-grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="container">

<h2>☁️ Money Manager</h2>

<!-- ADD CATEGORY -->
<div class="form-row">
<input type="text" id="newCategory" placeholder="Add Category">
<button onclick="addCategory()">Add Category</button>
</div>

<!-- FORM -->
<div class="form-row">
<input type="date" id="date">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<select id="category"></select>

<button onclick="addTransaction()">Add</button>
</div>

<!-- SUMMARY -->
<div class="summary">
<div class="card">Income ₹<span id="income">0</span></div>
<div class="card">Expense ₹<span id="expense">0</span></div>
<div class="card">Balance ₹<span id="balance">0</span></div>
</div>

<!-- GRID -->
<div class="main-grid">

<!-- TABLE -->
<div>
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Type</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<!-- CHART -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBCVoY823nRlgk3aKS5TuOfjr-QCiH3x_k",
  authDomain: "moneymanager-abcff.firebaseapp.com",
  projectId: "moneymanager-abcff",
  storageBucket: "moneymanager-abcff.firebasestorage.app",
  messagingSenderId: "1011399670430",
  appId: "1:1011399670430:web:07dc6b5e6d9368abd8998f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let categories = [];
let chart;

// SET TODAY
document.getElementById("date").value = new Date().toISOString().split('T')[0];

// LOAD CATEGORIES
function loadCategories(){
    let select = document.getElementById("category");
    select.innerHTML="";
    categories.forEach(c=>{
        select.innerHTML += `<option>${c}</option>`;
    });
}

// ADD CATEGORY (CLOUD)
window.addCategory = async function(){
    let val = newCategory.value.trim();
    if(!val) return alert("Enter category");

    await setDoc(doc(db, "categories", val), { name: val });
}

// LISTEN CATEGORIES
onSnapshot(collection(db,"categories"), snapshot=>{
    categories = [];
    snapshot.forEach(doc=>{
        categories.push(doc.data().name);
    });
    loadCategories();
});

// ADD TRANSACTION
window.addTransaction = async function(){
    if(!desc.value || !amount.value) return alert("Fill all fields");

    await addDoc(collection(db, "transactions"), {
        date: date.value,
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        desc: desc.value,
        amount: Number(amount.value),
        type: type.value,
        category: category.value,
        timestamp: Date.now()
    });

    desc.value="";
    amount.value="";
};

// DELETE
window.deleteItem = async function(id){
    await deleteDoc(doc(db, "transactions", id));
};

// REAL-TIME DATA
const q = query(collection(db,"transactions"), orderBy("timestamp","desc"));

onSnapshot(q, snapshot=>{
    data = [];
    snapshot.forEach(docSnap=>{
        data.push({ id: docSnap.id, ...docSnap.data() });
    });
    render();
});

// RENDER
function render(){
    let html="";
    let income=0, expense=0;

    data.forEach(e=>{
        if(e.type==="income") income+=e.amount;
        else expense+=e.amount;

        html += `
        <tr>
        <td>${e.date}</td>
        <td>${e.time}</td>
        <td>${e.type}</td>
        <td>${e.desc}</td>
        <td>${e.category}</td>
        <td>${e.amount}</td>
        <td><button onclick="deleteItem('${e.id}')">X</button></td>
        </tr>`;
    });

    list.innerHTML = html;
    incomeEl.innerText = income;
    expenseEl.innerText = expense;
    balanceEl.innerText = income - expense;

    drawChart();
}

// FIX IDs
const list = document.getElementById("list");
const incomeEl = document.getElementById("income");
const expenseEl = document.getElementById("expense");
const balanceEl = document.getElementById("balance");

// CHART
function drawChart(){
    let ctx=document.getElementById("chart");

    if(chart) chart.destroy();

    let cat={};

    data.forEach(e=>{
        if(e.type==="expense"){
            cat[e.category]=(cat[e.category]||0)+e.amount;
        }
    });

    chart = new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:Object.keys(cat),
            datasets:[{data:Object.values(cat)}]
        },
        options:{
            plugins:{ legend:{ position:'bottom' } }
        }
    });
}
</script>

</body>
</html>
