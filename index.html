<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#0f172a; color:white; }
.container { max-width:1100px; margin:auto; padding:15px; }
h2 { text-align:center; }

.form-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }

input, select {
    padding:10px;
    border-radius:8px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    flex:1;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.summary {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
    margin-top:15px;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.main-grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th, td {
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:center;
}

td button { background:#ef4444; }

.chart-box {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

@media(max-width:768px){
    .summary { grid-template-columns:1fr; }
    .main-grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Money Manager</h2>

<!-- CATEGORY -->
<div class="form-row">
<input type="text" id="newCategory" placeholder="Add Category">
<button onclick="addCategory()">Add Category</button>
</div>

<!-- FORM -->
<div class="form-row">
<input type="date" id="date">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<select id="category"></select>

<button onclick="addTransaction()">Add</button>
</div>

<!-- SUMMARY -->
<div class="summary">
<div class="card">Income ₹<span id="income">0</span></div>
<div class="card">Expense ₹<span id="expense">0</span></div>
<div class="card">Balance ₹<span id="balance">0</span></div>
</div>

<!-- GRID -->
<div class="main-grid">

<div>
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Type</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ✅ SAFE LOAD (prevents data loss)
let data = JSON.parse(localStorage.getItem("data") || "[]");
let categories = JSON.parse(localStorage.getItem("categories") || '["Food","Travel","Bills"]');

let chart;

// default date
document.getElementById("date").value = new Date().toISOString().split('T')[0];

// load categories
function loadCategories(){
    let c = document.getElementById("category");
    c.innerHTML="";
    categories.forEach(x=>{
        c.innerHTML += `<option>${x}</option>`;
    });
}

// add category
window.addCategory = function(){
    let newCat = document.getElementById("newCategory").value.trim();

    if(!newCat) return alert("Enter category");

    if(categories.includes(newCat)) return alert("Already exists");

    categories.push(newCat);
    localStorage.setItem("categories", JSON.stringify(categories));

    loadCategories();
    document.getElementById("newCategory").value="";
}

// add transaction
window.addTransaction = function(){
    let t = {
        date:date.value,
        time:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        desc:desc.value,
        amount:+amount.value,
        type:type.value,
        category:category.value
    };

    if(!t.desc || !t.amount) return alert("Fill all fields");

    data.push(t);

    // ✅ FORCE SAVE
    localStorage.setItem("data", JSON.stringify(data));

    show();

    desc.value="";
    amount.value="";
}

// delete
window.deleteItem = function(i){
    data.splice(i,1);
    localStorage.setItem("data", JSON.stringify(data));
    show();
}

// render
function show(){
    let list="";
    let income=0, expense=0;

    data.forEach((e,i)=>{
        if(e.type=="income") income+=e.amount;
        else expense+=e.amount;

        list+=`
        <tr>
        <td>${e.date}</td>
        <td>${e.time}</td>
        <td>${e.type}</td>
        <td>${e.desc}</td>
        <td>${e.category}</td>
        <td>${e.amount}</td>
        <td><button onclick="deleteItem(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById("list").innerHTML=list;
    document.getElementById("income").innerText=income;
    document.getElementById("expense").innerText=expense;
    document.getElementById("balance").innerText=income-expense;

    drawChart();
}

// chart
function drawChart(){
    let ctx=document.getElementById("chart");

    if(chart) chart.destroy();

    let cat={};

    data.forEach(e=>{
        if(e.type==="expense"){
            cat[e.category]=(cat[e.category]||0)+e.amount;
        }
    });

    chart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:Object.keys(cat),
            datasets:[{data:Object.values(cat)}]
        },
        options:{
            plugins:{ legend:{ position:'bottom' } }
        }
    });
}

loadCategories();
show();

// ✅ SERVICE WORKER REGISTER
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}

});
</script>

</body>
</html>
